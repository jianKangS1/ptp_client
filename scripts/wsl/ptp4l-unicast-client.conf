# linuxptp ptp4l — WSL 单播从时钟（与 UNICAST-SLAVE 示例一致，需改 IP / 网卡名）
# 文档: https://linuxptp.nwtime.org/documentation/configs/unicast-slave/
#
# 使用前请修改：
#   1) [unicast_master_table] 里的 UDPv4 —— 填 Grandmaster 的 IP（不可达则 ptp4l 会一直重试）
#   2) 最后一节 [eth0] —— 改成 WSL 里真实网卡名（运行: ip -br link）
#   3) domainNumber —— G.8275.2 默认域为 44；若 GM 用 0，这里改为 0

[global]
domainNumber 44
slaveOnly 1
unicast_req_duration 300
hybrid_e2e 1
logging_level 6

[unicast_master_table]
table_id 1
logQueryInterval 0
UDPv4 192.168.1.1

[eth0]
unicast_master_table 1
